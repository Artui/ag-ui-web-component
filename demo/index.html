<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ag-ui-web-component — demo</title>
    <style>
      :root {
        --accent: #4f46e5;
        --border: #e2e2ec;
        --fg: #1a1a2e;
        --muted: #6b7280;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: var(--fg);
        background: #f7f7fb;
      }
      header {
        background: #1a1a2e;
        color: #fff;
        padding: 14px 28px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }
      header small { color: #b6b6d8; font-weight: 400; margin-left: 8px; }
      main {
        max-width: 720px;
        margin: 32px auto;
        padding: 0 24px;
      }
      .card {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 24px 28px 28px;
        box-shadow: 0 6px 20px rgba(20, 20, 50, 0.05);
      }
      h1 { margin: 0 0 4px; font-size: 22px; }
      .subtitle { margin: 0 0 24px; color: var(--muted); }
      .field { margin-bottom: 18px; }
      .field label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
      .field input[type="text"],
      .field select {
        width: 100%;
        padding: 10px 12px;
        font: inherit;
        border: 1px solid var(--border);
        border-radius: 8px;
        outline: none;
      }
      .field input:focus, .field select:focus { border-color: var(--accent); }
      .checkbox { display: flex; align-items: center; gap: 8px; }
      .checkbox label { margin: 0; font-weight: 500; }
      .actions { margin-top: 24px; display: flex; gap: 12px; align-items: center; }
      button.save {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 20px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      .banner {
        display: none;
        color: #047857;
        font-weight: 600;
      }
      .banner.show { display: inline; }
      .hint {
        margin: 22px auto 0;
        max-width: 720px;
        padding: 0 24px;
        color: var(--muted);
        font-size: 14px;
      }
      code {
        background: #eef2ff;
        color: var(--accent);
        padding: 1px 6px;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <header>Demo Admin <small>· ag-ui-web-component</small></header>

    <main>
      <div class="card">
        <h1>Create Article</h1>
        <p class="subtitle">Ask the assistant (bottom-right) to fill this in for you.</p>

        <form id="article-form">
          <div class="field">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" placeholder="Article title" />
          </div>
          <div class="field">
            <label for="slug">Slug</label>
            <input type="text" id="slug" name="slug" placeholder="article-slug" />
          </div>
          <div class="field">
            <label for="status">Status</label>
            <select id="status" name="status">
              <option value="draft">Draft</option>
              <option value="review">In review</option>
              <option value="published">Published</option>
            </select>
          </div>
          <div class="field checkbox">
            <input type="checkbox" id="featured" name="featured" />
            <label for="featured">Featured on homepage</label>
          </div>
          <div class="actions">
            <button type="button" class="save" id="save">Save</button>
            <span class="banner" id="banner">✓ Article saved</span>
          </div>
        </form>
      </div>

      <p class="hint">
        Try: <code>Create an article titled "Hello, AG-UI", slug hello-ag-ui, published and featured, then save</code>
      </p>
    </main>

    <ag-ui-chat endpoint="/agent/" title-text="Admin Copilot"></ag-ui-chat>

    <script type="module">
      import {
        defineAgUiChat,
        fillField,
        setControlValue,
        clickElement,
        X_DESTRUCTIVE_KEY,
      } from "/bundle.js";

      defineAgUiChat();

      const $ = (id) => document.getElementById(id);
      const chat = document.querySelector("ag-ui-chat");

      chat.registerTool({
        name: "fill_field",
        description: "Fill a text input by id with a value.",
        parameters: {
          type: "object",
          properties: { field: { type: "string" }, value: { type: "string" } },
        },
        handler: async ({ field, value }) => {
          await fillField($(field), String(value), { charDelayMs: 45 });
          return "ok";
        },
      });

      chat.registerTool({
        name: "select_option",
        description: "Choose an option in a select by id.",
        parameters: {
          type: "object",
          properties: { field: { type: "string" }, value: { type: "string" } },
        },
        handler: ({ field, value }) => {
          setControlValue($(field), String(value));
          return "ok";
        },
      });

      chat.registerTool({
        name: "toggle_checkbox",
        description: "Set a checkbox by id.",
        parameters: {
          type: "object",
          properties: { field: { type: "string" }, value: { type: "boolean" } },
        },
        handler: ({ field, value }) => {
          setControlValue($(field), Boolean(value));
          return "ok";
        },
      });

      chat.registerTool({
        name: "click_save",
        description: "Save the article. Destructive — asks for confirmation.",
        parameters: { type: "object", properties: {}, [X_DESTRUCTIVE_KEY]: true },
        handler: async () => {
          await clickElement($("save"), { highlightMs: 400 });
          return "saved";
        },
      });

      $("save").addEventListener("click", () => {
        $("banner").classList.add("show");
      });
    </script>
  </body>
</html>
