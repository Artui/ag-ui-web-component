<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ag-ui-web-component — embedded (in-flow continuation)</title>
    <link rel="stylesheet" href="/themes/form.css" />
    <style>
      :root {
        --page-bg: #f7f7fb;
        --page-fg: #1f2430;
        --page-muted: #6b7280;
        --page-header-bg: #ffffff;
        --page-header-fg: #1f2430;
        --page-card-bg: #ffffff;
        --page-input-bg: #ffffff;
        --page-border: #e4e4ee;
        --page-shadow: rgba(20, 20, 50, 0.05);
        --page-accent: #4f46e5;
        --page-accent-fg: #ffffff;
        --page-success: #047857;
        --page-code-bg: #eef2ff;

        /* One typeface for the whole app — the chat inherits it. */
        font-family: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }

      /*
        The app owns the layout: a top bar spanning the full width, then a
        two-column body — main content on the left, the chat as a real
        in-flow column on the right. The chat does not float; it is part of
        the document, separated only by a clear border.
      */
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        display: grid;
        grid-template-columns: 1fr 400px;
        grid-template-rows: auto 1fr;
        height: 100vh;
        background: var(--page-bg);
        color: var(--page-fg);
      }
      .appbar {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 22px;
        height: 52px;
        background: var(--page-header-bg);
        border-bottom: 1px solid var(--page-border);
        font-weight: 600;
      }
      .appbar small {
        color: var(--page-muted);
        font-weight: 400;
      }
      .content {
        grid-column: 1;
        grid-row: 2;
        overflow: auto;
        padding: 28px;
      }

      /*
        Embed the chat in the page flow: static positioning, fills its grid
        cell, flush (no shadow, no radius), a quiet header that matches the
        surface, and the host typeface. A single left border is the only
        thing separating it from the main content — it reads as a panel
        within the app, not a popup over it.
      */
      ag-ui-chat {
        grid-column: 2;
        grid-row: 2;
        --ag-ui-position: static;
        --ag-ui-width: 100%;
        --ag-ui-height: 100%;
        --ag-ui-max-width: none;
        --ag-ui-max-height: none;
        --ag-ui-radius: 0;
        --ag-ui-shadow: none;
        --ag-ui-border: transparent;
        --ag-ui-header-bg: var(--page-header-bg);
        --ag-ui-header-fg: var(--page-fg);
        --ag-ui-assistant-bg: #f1f1f6;
        --ag-ui-input-bg: #ffffff;
        border-left: 1px solid var(--page-border);
      }
    </style>
  </head>
  <body>
    <div class="appbar">Demo Admin <small>· embedded chat (in-flow)</small></div>

    <div class="content">
      <div class="card">
        <h1>Create Article</h1>
        <p class="subtitle">The assistant on the right is part of this page — a bordered panel, not a floating popup.</p>

        <form id="article-form">
          <div class="field">
            <label for="title">Title</label>
            <input type="text" id="title" name="title" placeholder="Article title" />
          </div>
          <div class="field">
            <label for="slug">Slug</label>
            <input type="text" id="slug" name="slug" placeholder="article-slug" />
          </div>
          <div class="field">
            <label for="status">Status</label>
            <select id="status" name="status">
              <option value="draft">Draft</option>
              <option value="review">In review</option>
              <option value="published">Published</option>
            </select>
          </div>
          <div class="field checkbox">
            <input type="checkbox" id="featured" name="featured" />
            <label for="featured">Featured on homepage</label>
          </div>
          <div class="actions">
            <button type="button" class="save" id="save">Save</button>
            <span class="banner" id="banner">✓ Article saved</span>
          </div>
        </form>
      </div>

      <p class="hint">
        Try: <code>Create an article titled "Hello, AG-UI", slug hello-ag-ui, published and featured, then save</code>
      </p>
    </div>

    <ag-ui-chat endpoint="/agent/" title-text="Assistant"></ag-ui-chat>

    <script type="module" src="/themes/demo.js"></script>
  </body>
</html>
