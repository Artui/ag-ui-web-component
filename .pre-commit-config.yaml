repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=2000"]

  - repo: local
    hooks:
      - id: biome-check
        name: "biome check --write"
        entry: make lint-fix
        pass_filenames: false
        language: system
        stages: [pre-commit]

      - id: biome-format
        name: "biome format --write"
        entry: make format
        pass_filenames: false
        language: system
        stages: [pre-commit]

      - id: type-check
        name: "type check (tsc)"
        entry: make type-check
        pass_filenames: false
        language: system
        stages: [pre-commit]

      - id: forbid-local-paths
        name: "forbid local filesystem paths / personal handles"
        entry: "/Users/|arturveres"
        language: pygrep
        types: [text]
        exclude: '^\.pre-commit-config\.yaml$'
